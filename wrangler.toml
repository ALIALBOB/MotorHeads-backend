name = "motorheads-backend"
main = "src/index.js"
compatibility_date = "2026-06-08"

[vars]
CORS_ORIGIN = "https://motorheads.example"
ALLOW_UNVERIFIED_WRITES = "false"
MOTORHEADS_DEPLOY_BLOCK = "0"
INDEXER_CONFIRMATIONS = "6"
INDEXER_MAX_BLOCK_RANGE = "1000"
GAS_LOW_GWEI = "15"
GAS_MEDIUM_GWEI = "45"
GAS_HIGH_GWEI = "90"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "motorheads_registry"
database_id = "REPLACE_WITH_CLOUDFLARE_D1_DATABASE_ID"
