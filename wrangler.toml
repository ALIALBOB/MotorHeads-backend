name = "motorheads-backend"
main = "src/index.js"
compatibility_date = "2026-06-08"

[vars]
CORS_ORIGIN = "*"
ALLOW_UNVERIFIED_WRITES = "false"
MOTORHEADS_DEPLOY_BLOCK = "25261729"
INDEXER_CONFIRMATIONS = "6"
INDEXER_MAX_BLOCK_RANGE = "1000"
INDEXER_MAX_LOGS_PER_RUN = "50"
GAS_LOW_GWEI = "15"
GAS_MEDIUM_GWEI = "45"
GAS_HIGH_GWEI = "90"
EMERGENCY_READ_ONLY = "false"
INDEXER_ENABLED = "true"
SAFETY_MAX_INDEXER_RUNS_PER_DAY = "320"
SAFETY_MAX_RPC_CALLS_PER_DAY = "5000"
SAFETY_MAX_REGISTRY_WRITES_PER_DAY = "1000"

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "motorheads_registry"
database_id = "c34beb92-48c2-46ff-b01c-41b92b16a633"
